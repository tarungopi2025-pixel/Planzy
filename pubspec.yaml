name: planzy
description: Productivity Redefined
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  path_provider: ^2.1.5
  intl: ^0.20.2

  share_plus: ^13.1.0
  cross_file: ^0.3.4+2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#08152E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#08152E"
    theme_color: "#2EE6A6"

  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48